<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password – iSoftrend System</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Manrope',system-ui,sans-serif;background:linear-gradient(135deg,#0f1c3a 0%,#17284e 50%,#1e3a6e 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrap{width:100%;max-width:420px;}
.logo{text-align:center;margin-bottom:28px;}
.logo .icon{width:60px;height:60px;background:linear-gradient(135deg,#5da0f9,#2563eb);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:26px;color:#fff;box-shadow:0 8px 24px rgba(37,99,235,.4);margin-bottom:12px;}
.logo h1{color:#fff;font-size:22px;font-weight:800;}
.logo p{color:rgba(255,255,255,.5);font-size:12.5px;margin-top:4px;}
.card{background:#fff;border-radius:18px;padding:32px;box-shadow:0 24px 64px rgba(0,0,0,.35);}
.card h2{font-size:18px;font-weight:800;color:#12213f;margin-bottom:6px;}
.card .sub{font-size:12.5px;color:#60708f;margin-bottom:24px;line-height:1.6;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
.fg label{font-size:10.5px;font-weight:700;color:#60708f;text-transform:uppercase;letter-spacing:.7px;}
.input-wrap{position:relative;}
.input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#8a99b5;font-size:13px;}
.fc{width:100%;padding:10px 13px 10px 38px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13.5px;outline:none;transition:border-color .15s,box-shadow .15s;background:#fff;font-family:'Manrope',sans-serif;color:#12213f;}
.fc:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.fc::placeholder{color:#8a99b5;}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Manrope',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;box-shadow:0 4px 14px rgba(37,99,235,.3);margin-top:8px;}
.btn:hover{opacity:.92;}
.back{text-align:center;margin-top:14px;font-size:12.5px;color:#60708f;}
.back a{color:#2563eb;font-weight:600;text-decoration:none;}
.back a:hover{text-decoration:underline;}
.alert{padding:11px 14px;border-radius:9px;font-size:12.5px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.alert-error{background:#fee2e2;color:#b91c1c;}
.alert-success{background:#dcfce7;color:#15803d;}
.alert-info{background:#cffafe;color:#0e7490;word-break:break-all;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="icon"><i class="fas fa-key"></i></div>
    <h1>iSoftrend System</h1>
    <p>Password Recovery</p>
  </div>
  <div class="card">
    <h2>Forgot Password?</h2>
    <p class="sub">Enter the email address linked to your account and we'll send you OTP.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'error' if category == 'error' else ('success' if category == 'success' else 'info') }}">
          <i class="fas fa-{{ 'circle-xmark' if category == 'error' else ('circle-check' if category == 'success' else 'circle-info') }}"></i>
          {{ message }}
        </div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="fg">
        <label>Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" name="email" class="fc" placeholder="Enter your account email" required autofocus>
        </div>
      </div>
      <button type="submit" class="btn"><i class="fas fa-paper-plane"></i>Send OTP</button>
    </form>
    <div class="back"><a href="/login"><i class="fas fa-arrow-left" style="font-size:11px;"></i> Back to Login</a></div>
  </div>
</div>
</body>
</html>
